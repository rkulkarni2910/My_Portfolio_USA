# GitHub Actions workflow to build and deploy the Vite React app to Azure Static Web Apps
# Steps to finish setup:
# 1. In Azure Portal create a Static Web App (or open an existing one) and copy the "Deployment token" from Manage deployment token.
# 2. In GitHub go to Settings -> Secrets and variables -> Actions -> New repository secret
#    - Name: AZURE_STATIC_WEB_APPS_API_TOKEN
#    - Value: (paste the deployment token from Azure)
# 3. Push to the `main` branch (or change the workflow trigger branch below).

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for PR comments and checks
          action: 'upload'
          app_location: '/' # App source code location (root)
          api_location: '' # No Azure Functions
          output_location: 'dist' # Built app location (Vite default)
